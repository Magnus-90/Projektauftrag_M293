      <form action="">
        <label class="form-label form-label-firstname">Vorname</label>
        <input class="input input-firstname" type="text" placeholder="Max">
        <label class="form-label form-label-lastname" for="">Nachname</label>
        <input class="input input-lastname" type="text" placeholder="Mustermann">
        <label class="form-label form-label-email" for="">E-Mail</label>
        <input class="input input-email" type="email" placeholder="max.mustermann@beispiel.com">
        <label class="form-label form-label-message" for="">Nachricht</label>
        <textarea class="input input-message" placeholder="Deine Nachricht..."></textarea>
        <button class="form-button">Senden</button>
      </form>
    </div>
